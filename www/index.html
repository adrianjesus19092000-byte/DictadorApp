<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dictador de Números Pro</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        /* VARIABLES DE DISEÑO PARA TEMAS (Por defecto Oscuro) */
        :root {
            --bg-body: #121212;
            --bg-panel: #1E1E1E;
            --bg-menu: #151515;
            --bg-btn-secondary: #2A2A2A;
            --border-color: #333333;
            --border-btn: #444444;
            --text-main: #FFFFFF;
            --text-label: #AAAAAA;
            --text-muted: #666666;
            --btn-main-bg: #FFFFFF;
            --btn-main-text: #000000;
            --btn-main-active: #DDDDDD;
            --btn-secondary-text: #FFFFFF;
        }

        /* CONFIGURACIÓN MODO CLARO */
        body.light-theme {
            --bg-body: #F0F2F5;
            --bg-panel: #FFFFFF;
            --bg-menu: #EEEEEE;
            --bg-btn-secondary: #E0E0E0;
            --border-color: #CCCCCC;
            --border-btn: #BBBBBB;
            --text-main: #000000;
            --text-label: #555555;
            --text-muted: #888888;
            --btn-main-bg: #121212;
            --btn-main-text: #FFFFFF;
            --btn-main-active: #333333;
            --btn-secondary-text: #000000;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            width: 100vw;
            overflow-x: hidden;
            overflow-y: auto;
            padding: 0px;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            display: flex;
            width: 100%;
            min-height: calc: 100vh;
            gap: 15px;
        }

        /* PANEL IZQUIERDO */
        .left-panel {
            width: 40%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        textarea {
            flex: 1;
            min-height: 200px;
            background-color: var(--bg-panel);
            color: var(--text-main);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            font-size: 14px;
            resize: none;
            font-family: monospace;
            user-select: text;
            transition: background-color 0.3s, border-color 0.3s;
        }

        .btn-primary {
            background-color: var(--bg-btn-secondary);
            color: var(--btn-secondary-text);
            border: 2px solid var(--border-btn);
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            text-align: center;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        input[type="file"] { display: none; }

        /* PANEL DERECHO */
        .right-panel {
            width: 60%;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-panel);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            position: relative;
            justify-content: space-between;
            min-height: 450px; /* Incrementado para contener números más grandes */
            transition: background-color 0.3s, border-color 0.3s;
        }

        body.fullscreen-mode .right-panel {
        width: 100% !important;
        height: 100vh !important;
        min-height: 100vh !important;
        border-radius: 0px !important;
        position: fixed !important;
        top: 0;
        left: 0;
        }
        



        /* VISOR DE NÚMEROS */
        .display-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px 0;
            overflow: hidden;
        }
        
.btn-exit {
    position: absolute;
    top: 10px;
    left: 10px;
    background: var(--bg-btn-secondary);
    color: var(--text-main);
    border: 1px solid var(--border-btn);
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
    display: none;
    z-index: 20;
}

body.fullscreen-mode .btn-exit {
    display: block;
}

        

        /* ESCALA EL DOBLE DE GRANDE */
        .current-number {
            font-weight: 900;
            line-height: 0.9;
            transition: color 0.2s, font-size 0.2s;
            text-align: center;
            width: 100%;
            word-wrap: break-word;
        }
        .size-normal { font-size: 160px; }
        .size-mediano { font-size: 240px; }
        .size-grande { font-size: 320px; }

        /* Colores dinámicos del número (Compatibles con ambos temas) */
        .color-blanco { color: var(--text-main); }
        .color-rojo { color: #FF4444; }
        .color-verde { color: #00C851; }
        .color-amarillo { color: #FFBB33; }
        .color-azul { color: #33b5e5; }

        .navigation-info {
            font-size: 13px;
            font-weight: bold;
            color: var(--text-muted);
            margin-top: 15px;
        }

        /* BOTONERAS */
        .playback-controls {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-top: auto;
        }

        .btn-action {
            flex: 1;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }
        .btn-nav { 
            background-color: var(--bg-btn-secondary); 
            color: var(--btn-secondary-text); 
            border: 1px solid var(--border-btn); 
        }
        .btn-nav:active { opacity: 0.8; }
        .btn-main { 
            background-color: var(--btn-main-bg); 
            color: var(--btn-main-text); 
        }
        .btn-main:active { background-color: var(--btn-main-active); }

        /* CONFIGURACIONES FLOTANTES */
        .btn-settings-toggle {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--bg-btn-secondary);
            border: 1px solid var(--border-btn);
            color: var(--btn-secondary-text);
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            z-index: 10;
        }

        .settings-panel {
            position: absolute;
            top: 45px;
            right: 10px;
            background-color: var(--bg-menu);
            border: 2px solid var(--border-btn);
            border-radius: 8px;
            padding: 8px;
            width: 220px;
            display: none;
            flex-direction: column;
            gap: 6px;
            z-index: 9;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.3);
        }

        .settings-panel.active { display: flex; }

        .setting-row {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .setting-row label {
            font-size: 10px;
            font-weight: bold;
            color: var(--text-label);
        }

        .options-grid {
            display: flex;
            gap: 4px;
        }

        .opt-btn {
            flex: 1;
            padding: 6px;
            font-size: 10px;
            font-weight: bold;
            background: var(--bg-btn-secondary);
            color: var(--btn-secondary-text);
            border: 1px solid var(--border-btn);
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
        }

        .opt-btn.selected {
            background: var(--btn-main-bg);
            color: var(--btn-main-text);
            border-color: var(--btn-main-bg);
        }

        .input-speed-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-speed {
            width: 70px;
            background-color: var(--bg-btn-secondary);
            color: var(--text-main);
            border: 1px solid var(--border-btn);
            border-radius: 4px;
            padding: 6px;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            user-select: text;
        }

        .input-speed-unit {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* DISEÑO DE CRÉDITOS AÑADIDO LIMPIAMENTE AL FINAL */
        .settings-credits {
            margin-top: 5px;
            padding-top: 10px;
            border-top: 1px dashed var(--border-btn);
            text-align: center;
        }

        .settings-credits .author-title {
            font-size: 10px;
            font-weight: bold;
            color: var(--text-label);
        }

        .settings-credits .author-email {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .footer-credit {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 9px;
            color: var(--text-muted);
            letter-spacing: 1px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="left-panel">
            <textarea id="numInput" placeholder="Los números aparecerán aquí automáticamente al cargar el archivo..."></textarea>
            <label class="btn-primary">
                📁 Seleccionar Archivo .txt
                <input type="file" id="filePicker" accept=".txt">
            </label>
        </div>

        <div class="right-panel">
            <button class="btn-exit" onclick="volverAInicio()">← SALIR</button>

            <button class="btn-settings-toggle" onclick="toggleSettings()">⚙️</button>

            <div class="settings-panel" id="settingsPanel">
                <div class="setting-row">
                    <label>TEMA DE INTERFAZ:</label>
                    <div class="options-grid">
                        <button class="opt-btn selected" id="themeDark" onclick="setTheme('dark')">OSCURO</button>
                        <button class="opt-btn" id="themeLight" onclick="setTheme('light')">CLARO</button>
                    </div>
                </div>

                <div class="setting-row">
                    <label>AUDIO VOZ:</label>
                    <div class="options-grid">
                        <button class="opt-btn selected" id="audioOn" onclick="setAudio(true)">ENCENDIDO</button>
                        <button class="opt-btn" id="audioOff" onclick="setAudio(false)">APAGADO</button>
                    </div>
                </div>

                <div class="setting-row">
                    <label>TAMAÑO DEL NÚMERO:</label>
                    <div class="options-grid">
                        <button class="opt-btn" id="size-normal" onclick="setSize('normal')">NORMAL</button>
                        <button class="opt-btn selected" id="size-mediano" onclick="setSize('mediano')">MEDIANO</button>
                        <button class="opt-btn" id="size-grande" onclick="setSize('grande')">GRANDE</button>
                    </div>
                </div>

                <div class="setting-row">
                    <label>COLOR DEL NÚMERO:</label>
                    <div class="options-grid">
                        <button class="opt-btn selected" id="col-blanco" onclick="setColor('blanco')" style="border-bottom: 3px solid #888;">BCO</button>
                        <button class="opt-btn" id="col-rojo" onclick="setColor('rojo')" style="border-bottom: 3px solid #FF4444;">RJO</button>
                        <button class="opt-btn" id="col-verde" onclick="setColor('verde')" style="border-bottom: 3px solid #00C851;">VDE</button>
                        <button class="opt-btn" id="col-amarillo" onclick="setColor('amarillo')" style="border-bottom: 3px solid #FFBB33;">AMA</button>
                        <button class="opt-btn" id="col-azul" onclick="setColor('azul')" style="border-bottom: 3px solid #33b5e5;">AZL</button>
                    </div>
                </div>

                <div class="setting-row">
                    <label>TIEMPO DE PAUSA:</label>
                    <div class="input-speed-container">
                        <input type="number" id="speedInput" class="input-speed" inputmode="decimal" min="0.1" step="0.1" value="1.5" oninput="updateSpeedManual(this.value)">
                        <span class="input-speed-unit">segundos por número</span>
                    </div>
                </div>

                <div class="settings-credits">
                    <div class="author-title">Desarrollado por: Adrián Mejías</div>
                    <div class="author-email">Contacto: adrianjesus19092000@gmail.com</div>
                </div>
            </div>

            <div class="display-section">
                <div class="current-number size-mediano color-blanco" id="numDisplay">---</div>
                <div class="navigation-info" id="navInfo">Índice: 0 / 0</div>
            </div>

            <div class="playback-controls">
                <button class="btn-action btn-nav" onclick="anteriorNumero()">⏮️</button>
                <button class="btn-action btn-main" id="btnPlayPause" onclick="toggleDictado()">INICIAR</button>
                <button class="btn-action btn-nav" onclick="siguienteNumero()">⏭️</button>
            </div>

            <div class="footer-credit">ADRIÁN MEJÍAS</div>
        </div>
    </div>

    <script>
        let numeros = [];
        let indiceActual = 0;
        let dictando = false;
        let timeoutId = null;
        let velocidadIntervalo = 1500;
        let audioHabilitado = true;

        let currentSizeClass = 'size-mediano';
        let currentColorClass = 'color-blanco';

        document.getElementById('filePicker').addEventListener('change', function(e) {
            const archivo = e.target.files[0];
            if (!archivo) return;

            const lector = new FileReader();
            lector.onload = function(e) {
                document.getElementById('numInput').value = e.target.result;
                procesarTexto(); 
            };
            lector.readAsText(archivo);
        });

        function procesarTexto() {
            const rawText = document.getElementById('numInput').value;
            numeros = rawText.match(/\d+/g) || [];
            
            if (numeros.length > 0) {
                indiceActual = 0;
                actualizarPantalla();
            } else {
                alert("No se hallaron secuencias de números válidas.");
                resetApp();
            }
        }

        function actualizarPantalla() {
            const display = document.getElementById('numDisplay');
            if (numeros.length === 0) {
                display.innerText = "---";
                document.getElementById('navInfo').innerText = `Índice: 0 / 0`;
                return;
            }
            display.innerText = numeros[indiceActual].substring(0, 3);
            document.getElementById('navInfo').innerText = `Índice: ${indiceActual + 1} / ${numeros.length}`;
        }

        function dictarNumero(texto) {
            if (!audioHabilitado) return;
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(texto);
                utterance.lang = 'es-ES';
                utterance.rate = 1.0;
                window.speechSynthesis.speak(utterance);
            }
        }

        function toggleDictado() {
            if (numeros.length === 0) {
                procesarTexto();
                if (numeros.length === 0) return;
            }
            if (dictando) { 
                pausarDictado(); 
            } else { 
                iniciarDictado(); 
            }
        }

        function iniciarDictado() {
            dictando = true;
            document.getElementById('btnPlayPause').innerText = "PAUSAR";
            document.body.classList.add('fullscreen-mode'); 
                    // Despertar voz
            if ('speechSynthesis' in window) {
                const dummy = new SpeechSynthesisUtterance("");
                window.speechSynthesis.speak(dummy);
            }
            ejecutarCiclo();

        }

        function pausarDictado() {
            dictando = false;
            document.getElementById('btnPlayPause').innerText = "CONTINUAR";
            if (timeoutId) clearTimeout(timeoutId);
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
        }

        function ejecutarCiclo() {
            if (!dictando) return;

            if (indiceActual < numeros.length) {
                actualizarPantalla();
                dictarNumero(numeros[indiceActual]);
                indiceActual++;
                timeoutId = setTimeout(ejecutarCiclo, velocidadIntervalo);
            } else {
                alert("Dictado finalizado por completo.");
                resetApp();
            }
        }

        function siguienteNumero() {
            if (numeros.length === 0) return;
            if (timeoutId) clearTimeout(timeoutId);
            
            if (indiceActual < numeros.length - 1) {
                if(!dictando) indiceActual++;
                actualizarPantalla();
                dictarNumero(numeros[indiceActual]);
                if(dictando) indiceActual++;
            }
            if (dictando) timeoutId = setTimeout(ejecutarCiclo, velocidadIntervalo);
        }

        function anteriorNumero() {
            if (numeros.length === 0) return;
            if (timeoutId) clearTimeout(timeoutId);

            let ajuste = dictando ? 2 : 1;
            if (indiceActual - ajuste >= 0) {
                indiceActual -= ajuste;
                actualizarPantalla();
                dictarNumero(numeros[indiceActual]);
                if(dictando) indiceActual++;
            }
            if (dictando) timeoutId = setTimeout(ejecutarCiclo, velocidadIntervalo);
        }

        function resetApp() {
            dictando = false;
            indiceActual = 0;
            if (timeoutId) clearTimeout(timeoutId);
            actualizarPantalla();
            document.getElementById('btnPlayPause').innerText = "INICIAR";
            document.body.classList.remove('fullscreen-mode'); 
        }

        function toggleSettings() {
            document.getElementById('settingsPanel').classList.toggle('active');
        }

        function setTheme(theme) {
            if (theme === 'light') {
                document.body.classList.add('light-theme');
                document.getElementById('themeLight').classList.add('selected');
                document.getElementById('themeDark').classList.remove('selected');
            } else {
                document.body.classList.remove('light-theme');
                document.getElementById('themeDark').classList.add('selected');
                document.getElementById('themeLight').classList.remove('selected');
            }
        }

        function setAudio(status) {
            audioHabilitado = status;
            document.getElementById('audioOn').classList.toggle('selected', status);
            document.getElementById('audioOff').classList.toggle('selected', !status);
            if(!status && 'speechSynthesis' in window) window.speechSynthesis.cancel();
        }

        function updateSpeedManual(val) {
            let parsed = parseFloat(val);
            if (isNaN(parsed) || parsed <= 0) {
                parsed = 1.5; 
            }
            velocidadIntervalo = parsed * 1000;
        }

        function setSize(size) {
            const display = document.getElementById('numDisplay');
            display.classList.remove(currentSizeClass);
            currentSizeClass = 'size-' + size;
            display.classList.add(currentSizeClass);

            ['normal', 'mediano', 'grande'].forEach(s => {
                document.getElementById('size-' + s).classList.toggle('selected', s === size);
            });
        }

        function setColor(color) {
            const display = document.getElementById('numDisplay');
            display.classList.remove(currentColorClass);
            currentColorClass = 'color-' + color;
            display.classList.add(currentColorClass);

            ['blanco', 'rojo', 'verde', 'amarillo', 'azul'].forEach(c => {
                document.getElementById('col-' + c).classList.toggle('selected', c === color);
            });
        }
        function volverAInicio() {
    document.body.classList.remove('fullscreen-mode');
}

    </script>
</body>
</html>
